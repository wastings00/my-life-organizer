<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Life Organizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial; padding: 10px; }
    textarea, input, button { width: 100%; margin: 5px 0; }
  </style>
</head>
<body>

<h2>🔒 Lock</h2>
<input type="password" id="pin" placeholder="Set / Enter PIN">
<button onclick="unlock()">Unlock</button>

<div id="app" style="display:none;">
  <h2>📝 Notes</h2>
  <textarea id="note" placeholder="Write your day..."></textarea>
  <button onclick="saveNote()">Save</button>

  <h2>⏰ Reminder</h2>
  <input type="datetime-local" id="reminderTime">
  <button onclick="setReminder()">Set Reminder</button>

  <h2>⏱ Stopwatch</h2>
  <button onclick="startWatch()">Start</button>
  <button onclick="stopWatch()">Stop</button>
  <p id="watch">0</p>
</div>

<script>
let timer, seconds=0;

function unlock(){
  localStorage.pin = localStorage.pin || pin.value;
  if(pin.value === localStorage.pin){
    app.style.display="block";
  }
}

function saveNote(){
  localStorage.note = note.value;
}

function setReminder(){
  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      setTimeout(()=>new Notification("Reminder Time!"),
      new Date(reminderTime.value)-Date.now());
    }
  });
}

function startWatch(){
  timer = setInterval(()=>watch.innerText=++seconds,1000);
}
function stopWatch(){
  clearInterval(timer);
}
</script>

</body>
